spring.application.name=ecommerceProject
server.port=8080


# DATABASE
spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# JPA / HIBERNATE

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=stridfire_super_secret_key_2026_nikhil
jwt.expiration=86400000

# STRIPE
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY}
spring.main.allow-bean-definition-overriding=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ? Add frontend URL env variable
spring.security.oauth2.client.registration.google.redirect-uri=https://stridefire-ecommerce-production.up.railway.app/login/oauth2/code/google

